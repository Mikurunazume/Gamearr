name: Deploy Web App

on:
  # Allow manual trigger for on-demand deployment
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - dev
      tag:
        description: "Docker image tag (leave empty for auto-generated tag)"
        required: false
        default: ""
      build_arm64:
        description: "Build ARM64 image (slows down build)"
        required: false
        default: true
        type: boolean

  # Run daily at midnight for dev builds
  schedule:
    - cron: "0 0 * * *"

  # Trigger on release/1.3.0 branch for dev release
  push:
    branches:
      - "release/1.3.0"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'schedule' || github.ref == 'refs/heads/release/1.3.0') && 'dev' || inputs.environment || 'production' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.2.0

      - name: Determine Environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "schedule" ] || [ "$GH_REF" == "refs/heads/release/1.3.0" ]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=$INPUT_ENVIRONMENT" >> $GITHUB_ENV
            echo "environment=$INPUT_ENVIRONMENT" >> $GITHUB_OUTPUT
          fi

          # Normalize repository name to lowercase and strip owner for Docker Hub
          REPO_NAME="$REPOSITORY"
          # Get the part after the slash (repo name only)
          REPO_SHOULD_BE_NAME="${REPO_NAME##*/}"
          # Lowercase
          REPO_NAME_LC=$(echo "$REPO_SHOULD_BE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME_LC=$REPO_NAME_LC" >> $GITHUB_ENV

      - name: Set up QEMU
        if: env.ENVIRONMENT == 'production' && inputs.build_arm64 != false
        uses: step-security/setup-qemu-action@8c4aef027ab2df56e08f597afe6dd8cd31cb84f5 # v3.7.0

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: step-security/docker-login-action@6aa05fe688caf2c58e784663f01b3415ced503e8 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: step-security/docker-login-action@6aa05fe688caf2c58e784663f01b3415ced503e8 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            doezer/${{ env.REPO_NAME_LC }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ env.ENVIRONMENT == 'production' }}
            type=raw,value=dev,enable=${{ env.ENVIRONMENT == 'dev' }}
            type=sha,prefix=${{ env.ENVIRONMENT }}-sha-,format=short,enable=${{ env.ENVIRONMENT != 'dev' }}
          labels: |
            org.opencontainers.image.title=Questarr
            org.opencontainers.image.description=A video game management application inspired by the -Arr apps. Track and organize your video game collection with automated discovery and download management.
            org.opencontainers.image.vendor=Doezer

      - name: Build and push Docker image
        uses: step-security/docker-build-push-action@a8c3d08b23f8be6aeed43eb1a14ce6fe51284438 # v6.18.0
        with:
          context: .
          platforms: ${{ (env.ENVIRONMENT == 'production' && inputs.build_arm64 != false) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ghcr.io/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Hub:** doezer/${{ env.REPO_NAME_LC }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull and run the image:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          TAG="latest"
          if [ "${{ env.ENVIRONMENT }}" == "dev" ]; then
            TAG="dev"
          fi
          echo "docker pull ghcr.io/${{ github.repository }}:$TAG" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 5000:5000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e POSTGRES_PASSWORD=your_password \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e IGDB_CLIENT_ID=your_client_id \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e IGDB_CLIENT_SECRET=your_client_secret \\" >> $GITHUB_STEP_SUMMARY
          echo "  ghcr.io/${{ github.repository }}:$TAG" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
